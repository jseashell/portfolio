name: Pipeline
run-name: ${{ github.event.head_commit.message }}
on: [push]

# Need ID token write permission to use OIDC for AWS deployment
permissions:
  id-token: write

jobs:
  Pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout project
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
      - name: Install project
        run: npm ci --silent
      - name: Build web app
        run: npm run build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::008908697155:role/github_actions_portfolio
          aws-region: us-east-1
      - name: Serverless Deploy
        run: npx serverless deploy --stage main --verbose
