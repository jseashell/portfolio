<div id="top" class="component">
  <app-hero appFadeInOnScroll></app-hero>
</div>
<div class="component card-wrapper">
  @for (card of cards; track $index) {
    <a [routerLink]="card.routerLink">
      <mat-card>
        <div class="thumbnail">
          <img [src]="card.thumbnail" />
        </div>
        <mat-card-content>
          <h2>{{ card.title }}</h2>
          <div [innerHTML]="card.body"></div>
        </mat-card-content>
      </mat-card>
    </a>
  }
</div>
<div class="component">
  <app-contact></app-contact>
</div>
